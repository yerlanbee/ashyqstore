version: '3.3'
services:

    #Nginx Service
    webserver:
        image: nginx:alpine
        container_name: ashyqstore_webserver
        restart: unless-stopped
        tty: true
        ports:
            - '8081:80'
        volumes:
            - ./:/var/www
            - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
        depends_on:
            - app

    #App Service
    app:
        image: ashyqstore_image
        build:
            context: .
            dockerfile: ./docker/Dockerfile
        container_name: ashyqstore_app
        restart: unless-stopped
        environment:
            CONTAINER_ROLE: app
            PHP_OPCACHE_VALIDATE_TIMESTAMPS: 1
            APP_ENV: production
        volumes:
            - ./:/var/www
            - ./docker/php/local.ini:/usr/local/etc/php/php.ini
            - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf:cached
            - ./docker/php/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini
        depends_on:
            - db

    # PgSQL
    db:
        image: postgres:14
        restart: always
        container_name: ashyqstore_db
        ports:
            - '5461:5432'
        environment:
            POSTGRES_DB: "${DB_DATABASE}"
            POSTGRES_USER: "${DB_USERNAME}"
            POSTGRES_PASSWORD: "${DB_PASSWORD}"
        volumes:
            - 'ashyqstore_volume:/var/lib/postgresql/data'

    redis:
        image: redis:4.0
        container_name: ashyqstore_redis
        ports:
            - "6362:6379"
        volumes:
            - "ashyqstore_redis_volume:/data"

#Volumes
volumes:
    ashyqstore_volume:
    ashyqstore_pgadmin_volume:
    ashyqstore_redis_volume:

networks:
    ashyqstore_network:
        driver: bridge
